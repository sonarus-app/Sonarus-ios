name: Sonarus
options:
  bundleIdPrefix: com.sonarus
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.10'
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
configs:
  Debug: debug
  Release: release
targets:
  Sonarus:
    type: application
    platform: iOS
    sources:
      - path: Sonarus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonarus.app
        PRODUCT_NAME: Sonarus
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sonarus
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
    scheme:
      gatherCoverageData: true
      testTargets:
        - SonarusTests
  SonarusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SonarusTests
    dependencies:
      - target: Sonarus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonarus.app.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Sonarus.app/Sonarus
